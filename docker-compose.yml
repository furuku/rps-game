services:
  nginx:
    image: nginx:latest
    container_name: rps_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web1:
        condition: service_healthy
      web2:
        condition: service_healthy

  web1:
    build: .
    container_name: rps_web1
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      NODE_ENV: production
    expose:
      - "3000"
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      sh -c "
      echo 'Waiting for Postgres...';
      until nc -z rps_postgres 5432; do sleep 1; done;
      echo 'Waiting for RabbitMQ...';
      until nc -z rps_rabbitmq 5672; do sleep 1; done;
      echo 'Running Prisma generate and migrate...';
      npx prisma generate;
      npx prisma migrate deploy;
      echo 'Starting app...';
      npm start
      "

  web2:
    build: .
    container_name: rps_web2
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      NODE_ENV: production
    expose:
      - "3000"
    ports:
      - "3002:3000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      sh -c "
      echo 'Waiting for Postgres...';
      until nc -z rps_postgres 5432; do sleep 1; done;
      echo 'Waiting for RabbitMQ...';
      until nc -z rps_rabbitmq 5672; do sleep 1; done;
      echo 'Running Prisma generate and migrate...';
      npx prisma generate;
      npx prisma migrate deploy;
      echo 'Starting app...';
      npm start
      "

  postgres:
    image: postgres:15
    container_name: rps_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rps_rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics", "-q", "status"]
      interval: 30s
      timeout: 10s
      retries: 5

  test:
    build: .
    container_name: rps_test
    depends_on:
      postgres:
        condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL}
    command: >
      sh -c "
      npm ci --include=dev &&
      npx prisma migrate deploy &&
      npm test -- --ci
      "
    profiles:
      - test

  e2e:
    image: mcr.microsoft.com/playwright:v1.58.2-jammy
    container_name: rps_e2e
    working_dir: /app
    depends_on:
      web1:
        condition: service_started
      web2:
        condition: service_started
    environment:
      - BASE_URL=http://nginx:80
    volumes:
      - .:/app
    command: >
      sh -c "
      npm ci &&
      npx playwright test
      "
    profiles:
      - test

volumes:
  postgres_data:
  rabbitmq_data:
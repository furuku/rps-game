services:
  nginx:
    image: nginx:latest
    container_name: rps_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_healthy

  web:
    build: .
    container_name: rps_web
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      NODE_ENV: production
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      sh -c "
      wait-for-it postgres:5432 &&
      wait-for-it rabbitmq:5672 &&
      npx prisma migrate deploy &&
      npm start
      "

  postgres:
    image: postgres:15
    container_name: rps_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rps_rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 5s
      timeout: 5s
      retries: 5

  test:
    build: .
    container_name: rps_test
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    command: >
      sh -c "
      npm ci --include=dev &&
      npx prisma migrate deploy &&
      npm test -- --ci
      "
    profiles:
      - test

  e2e:
    image: mcr.microsoft.com/playwright:v1.58.2-jammy
    container_name: rps_e2e
    working_dir: /app
    depends_on:
      web:
        condition: service_healthy
    environment:
      - BASE_URL=http://web:3000
    volumes:
      - .:/app
    command: >
      sh -c "
      npm ci &&
      npx playwright test
      "
    profiles:
      - test

volumes:
  postgres_data:
  rabbitmq_data: